version: '3.8'

services:
  mysql:
    image: crpi-lzwvinqhz44z1c85.cn-hangzhou.personal.cr.aliyuncs.com/tctf/mysql8.2:latest
    container_name: xxctf_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: xxctf_mysql_pass
      MYSQL_DATABASE: ctf_db
      TZ: Asia/Shanghai
    ports:
      - "13306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pxxctf_mysql_pass"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ctf_network

  redis:
    image: crpi-lzwvinqhz44z1c85.cn-hangzhou.personal.cr.aliyuncs.com/tctf/redis-alpine:latest
    container_name: xxctf_redis
    restart: always
    command: redis-server --requirepass xxctf_redis_pass
    ports:
      - "16379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "xxctf_redis_pass", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ctf_network

  app:
    image: crpi-lzwvinqhz44z1c85.cn-hangzhou.personal.cr.aliyuncs.com/tctf/xxctf:latest
    container_name: xxctf_app
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: xxctf_mysql_pass
      MYSQL_DATABASE: ctf_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: xxctf_redis_pass
      FLASK_SECRET_KEY: xxctf-secret-key-change-in-production
    ports:
      - "5000:5000"
    volumes:
      - ./uploads:/app/uploads
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - ctf_network

volumes:
  mysql_data:
  redis_data:

networks:
  ctf_network:
    driver: bridge
